<div class="status-msg status-error">
  ✗ Please correct the errors below:
  <ul style="margin-top:8px; padding-left:16px;">
    {% for field in form %}
      {% for error in field.errors %}
        <li>{{ field.label }}: {{ error }}</li>
      {% endfor %}
    {% endfor %}
    {% for error in form.non_field_errors %}
      <li>{{ error }}</li>
    {% endfor %}
  </ul>
</div>
