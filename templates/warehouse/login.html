{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WMS — Login</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'IBM Plex Sans',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-wrap{width:100%;max-width:380px}
    .login-logo{text-align:center;margin-bottom:32px}
    .login-logo h1{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;color:#fff;letter-spacing:.06em}
    .login-logo h1 span{color:#0ea5e9}
    .login-logo p{font-size:13px;color:#64748b;margin-top:6px}
    .login-card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:32px}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#94a3b8;margin-bottom:6px}
    .pw-wrap{position:relative}
    .form-input{width:100%;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;font-family:'IBM Plex Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s}
    .form-input:focus{border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,.15)}
    .form-input::placeholder{color:#475569}
    .pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b;font-size:13px;padding:4px}
    .pw-toggle:hover{color:#94a3b8}
    .btn-login{width:100%;padding:11px;background:#0ea5e9;color:#fff;border:none;border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;transition:background .15s}
    .btn-login:hover{background:#0284c7}
    .error-msg{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
    #login-error{min-height:0}
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <h1>W<span>M</span>S</h1>
      <p>Warehouse Management System</p>
      <p>DYSER Group LLC</p>
    </div>
    <div class="login-card">
      <div id="login-error">
        {% if messages %}{% for msg in messages %}<div class="error-msg">{{ msg }}</div>{% endfor %}{% endif %}
      </div>
      <form hx-post="{% url 'login' %}" hx-target="#login-error" hx-swap="innerHTML">
        {% csrf_token %}
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" class="form-input"
                 placeholder="your username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input id="password" name="password" type="password" class="form-input"
                   placeholder="••••••••" autocomplete="current-password" required style="padding-right:40px">
            <button type="button" class="pw-toggle" onclick="togglePw()" title="Show/hide password">👁</button>
          </div>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
      </form>
    </div>
  </div>
  <script>
  function togglePw() {
    const f = document.getElementById('password');
    f.type = f.type === 'password' ? 'text' : 'password';
  }
  </script>
</body>
</html>
